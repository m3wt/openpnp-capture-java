name: Build OpenPnP Capture Java Distribution

on:
  push:
  pull_request:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest]
        java: [8]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v2

      - name: Setup JDK ${{ matrix.java }}
        uses: actions/setup-java@v1
        with:
          java-version: ${{ matrix.java }}

      - name: Cache maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Determine native release tag
        id: native_tag
        run: |
          # When triggered by a tag push, use that tag name so the native
          # download version matches the JAR version. Otherwise fall back
          # to a known-good released tag on m3wt/openpnp-capture.
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v0.0.28-m3wt-1" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        run: |
          ./scripts/download-openpnp-capture.sh ${{ steps.native_tag.outputs.tag }}
          mvn -B clean package

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          path: |
            target/openpnp-capture-java-*.jar

      - name: Create Release
        if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
        uses: ncipollo/release-action@v1
        with:
            artifacts: "target/openpnp-capture-java*.jar"
            token: ${{ secrets.GITHUB_TOKEN }}
            allowUpdates: true
